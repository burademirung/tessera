<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="Identity flow graph (static)">
  <rect width="800" height="420" fill="#F4F3EE"/>
  <!-- grout tile grid -->
  <g stroke="#E4E1D8" stroke-width="1" opacity="0.6">
    <path d="M0 60H800M0 120H800M0 180H800M0 240H800M0 300H800M0 360H800"/>
    <path d="M80 0V420M160 0V420M240 0V420M320 0V420M400 0V420M480 0V420M560 0V420M640 0V420M720 0V420"/>
  </g>
  <!-- edges: IdP -> Edge hub -> {Policy, Control, three clouds}, with a lapis flow hint -->
  <g fill="none" stroke-linecap="round">
    <path d="M56 210 L288 210 M288 210 L288 63 M288 210 L288 357 M288 210 L704 71 M288 210 L704 210 M288 210 L704 349" stroke="#E4E1D8" stroke-width="2.5"/>
    <path d="M56 210 L288 210 M288 210 L288 63 M288 210 L288 357 M288 210 L704 71 M288 210 L704 210 M288 210 L704 349" stroke="#2740C8" stroke-width="2.5" stroke-dasharray="5 11" opacity="0.5"/>
  </g>
  <!-- pipeline nodes (lapis tesserae); Edge hub larger -->
  <g fill="rgba(39,64,200,0.08)" stroke="#2740C8">
    <rect x="35"  y="189" width="42" height="42" rx="7" stroke-width="1.5"/>
    <rect x="262" y="184" width="52" height="52" rx="9" stroke-width="2"/>
    <rect x="267" y="42"  width="42" height="42" rx="7" stroke-width="1.5"/>
    <rect x="267" y="336" width="42" height="42" rx="7" stroke-width="1.5"/>
  </g>
  <!-- federation clouds (gold tesserae) -->
  <g fill="rgba(176,132,43,0.12)" stroke="#B0842B" stroke-width="1.5">
    <rect x="683" y="50"  width="42" height="42" rx="7"/>
    <rect x="683" y="189" width="42" height="42" rx="7"/>
    <rect x="683" y="328" width="42" height="42" rx="7"/>
  </g>
  <g font-family="system-ui, sans-serif" font-size="13" fill="#15171C" text-anchor="middle">
    <text x="56"  y="252">Identity Provider</text>
    <text x="288" y="256" font-weight="600">Edge Engine</text>
    <text x="288" y="32">Policy (OPA/Regorus)</text>
    <text x="288" y="396">Control Plane</text>
    <text x="704" y="40">AWS</text>
    <text x="704" y="179">Azure</text>
    <text x="704" y="388">GCP</text>
  </g>
</svg>

name: cdk
on:
  pull_request:
    paths: ['cdk/**']
permissions:
  contents: read
concurrency:
  group: cdk-${{ github.ref }}
  cancel-in-progress: true
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cdk
    steps:
      - uses: ./.github/actions/harden-setup
        with:
          egress-policy: audit
          toolchain: node
      - run: npm ci
      - run: npm test
      - name: cdk synth (cdk-nag gates)
        run: npx cdk synth --quiet

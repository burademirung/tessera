name: infracost-guardrail
on:
  pull_request:
    paths: ['terraform/**', 'bootstrap/**']
permissions:
  contents: read
concurrency:
  group: infracost-${{ github.ref }}
  cancel-in-progress: true
jobs:
  cost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/harden-setup
        with:
          egress-policy: audit
      - name: Setup Infracost
        uses: infracost/actions/setup@e9d6e6cd65e168e76b0de50ff9957d2fe8bb1832 # v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}
      - name: Generate breakdown
        run: |
          infracost breakdown --path=terraform \
            --usage-file=terraform/infracost-usage.yml \
            --format=json --out-file=/tmp/infracost.json
      - name: Enforce ~$0 guardrail
        run: terraform/tests/cost_guardrail.test.sh /tmp/infracost.json

name: destroy
on:
  pull_request:
    types: [closed]
    paths: ['terraform/**', 'cdk/**']
permissions:
  contents: read
concurrency:
  group: destroy-${{ github.event.number }}
  cancel-in-progress: false   # never cancel an in-flight destroy
jobs:
  teardown:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - uses: ./.github/actions/harden-setup
        with:
          egress-policy: audit
          toolchain: terraform
      - name: AWS OIDC
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com
      - name: GCP OIDC
        uses: google-github-actions/auth@71f986410dfbc7added4569d411d040a91dc6935 # v2.1.8
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
      - name: Azure OIDC
        uses: azure/login@a65d910e8af852a8061c627c456678983e180302 # v2.2.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: cdk destroy
        working-directory: cdk
        run: |
          npm ci
          npx cdk destroy --force --context "env=pr-${PR_NUMBER}"
      - name: terraform destroy
        working-directory: terraform
        env:
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=tessera-tfstate" \
            -backend-config="key=federation/terraform.tfstate" \
            -backend-config="endpoints={s3=\"https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com\"}"
          terraform destroy -auto-approve -var="environment=pr-${PR_NUMBER}"

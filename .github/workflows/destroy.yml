name: destroy
on:
  pull_request:
    types: [closed]
    paths: ['terraform/**', 'cdk/**']
permissions:
  contents: read
concurrency:
  group: destroy-${{ github.event.number }}
  cancel-in-progress: false   # never cancel an in-flight destroy
jobs:
  teardown:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    env:
      PR_NUMBER: ${{ github.event.number }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/harden-setup
        with:
          egress-policy: audit
          toolchain: terraform
      - name: AWS OIDC
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com
      - name: GCP OIDC
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
      - name: Azure OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: cdk destroy
        working-directory: cdk
        run: |
          npm ci
          npx cdk destroy --force --context "env=pr-${PR_NUMBER}"
      - name: terraform destroy
        working-directory: terraform
        env:
          R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
        run: |
          terraform init \
            -backend-config="bucket=tessera-tfstate" \
            -backend-config="key=federation/terraform.tfstate" \
            -backend-config="endpoints={s3=\"https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com\"}"
          terraform destroy -auto-approve -var="environment=pr-${PR_NUMBER}"
